<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给帆帆的一封信 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #fbc2eb 100%);
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            text-align: center;
            padding: 50px 20px;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 3.5em;
            color: #fff;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .envelope {
            width: 300px;
            height: 200px;
            background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
            margin: 40px auto;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            transition: all 0.5s ease;
            box-shadow: 0 15px 35px rgba(255, 107, 107, 0.4);
        }

        .envelope:hover {
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 20px 45px rgba(255, 107, 107, 0.5);
        }

        .envelope::before {
            content: '💌';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
        }

        .envelope-text {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 1.2em;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.2);
        }

        .letter {
            display: none;
            background: #fff;
            max-width: 600px;
            margin: 0 auto;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            animation: openLetter 1s ease forwards;
        }

        .letter.show {
            display: block;
        }

        @keyframes openLetter {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.8);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .letter h2 {
            color: #ff6b6b;
            font-size: 2em;
            margin-bottom: 20px;
        }

        .letter p {
            color: #555;
            font-size: 1.2em;
            line-height: 2;
            margin-bottom: 15px;
        }

        .letter .signature {
            text-align: right;
            color: #ff6b6b;
            font-style: italic;
            margin-top: 30px;
            font-size: 1.3em;
        }

        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .heart {
            position: absolute;
            font-size: 30px;
            animation: floatUp 6s ease-in-out infinite;
            opacity: 0.7;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.7;
            }

            90% {
                opacity: 0.7;
            }

            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        .click-heart {
            position: absolute;
            font-size: 40px;
            pointer-events: none;
            animation: clickHeart 1s ease-out forwards;
            z-index: 1000;
        }

        @keyframes clickHeart {
            0% {
                transform: scale(0);
                opacity: 1;
            }

            50% {
                transform: scale(1.5);
                opacity: 0.8;
            }

            100% {
                transform: scale(2) translateY(-100px);
                opacity: 0;
            }
        }

        .love-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 1.2em;
            color: #ff6b6b;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .love-counter span {
            font-weight: bold;
            font-size: 1.5em;
        }

        .say-something {
            margin-top: 40px;
        }

        .say-something button {
            background: linear-gradient(145deg, #ff6b6b, #ff8e8e);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1.3em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        .say-something button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(255, 107, 107, 0.5);
        }

        .messages-container {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            max-width: 500px;
            margin: 30px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.1);
        }

        .messages-container.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message {
            padding: 20px;
            margin: 15px 0;
            border-radius: 15px;
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            color: #333;
            font-size: 1.1em;
            line-height: 1.8;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: #ff6b6b;
        }

        .confetti {
            position: fixed;
            width: 15px;
            height: 15px;
            top: -15px;
            animation: confettiFall 4s linear forwards;
            z-index: 1000;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .pet-pet {
            width: 150px;
            height: 150px;
            margin: 30px auto;
            cursor: pointer;
            position: relative;
        }

        .pet-pet::before {
            content: '🐱';
            font-size: 100px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.1s;
        }

        .pet-pet:active::before {
            content: '😻';
            transform: translate(-50%, -50%) scale(1.2);
        }

        .pet-text {
            color: #fff;
            font-size: 1.1em;
            margin-top: 15px;
        }

        .fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .firework {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: fireworkExplode 1s ease-out forwards;
        }

        @keyframes fireworkExplode {
            0% {
                transform: scale(0);
                opacity: 1;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: scale(20);
                opacity: 0;
            }
        }

        .photo-frame {
            width: 200px;
            height: 200px;
            margin: 30px auto;
            border-radius: 50%;
            overflow: hidden;
            border: 8px solid #fff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            }

            50% {
                box-shadow: 0 15px 45px rgba(255, 107, 107, 0.4);
            }
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 40px 0;
        }

        .countdown-item {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .countdown-item span {
            display: block;
            font-size: 2.5em;
            color: #ff6b6b;
            font-weight: bold;
        }

        .countdown-item label {
            color: #888;
            font-size: 0.9em;
        }

        .music-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ff6b6b, #ff8e8e);
            border: none;
            color: #fff;
            font-size: 1.5em;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
            z-index: 100;
            transition: all 0.3s;
        }

        .music-btn:hover {
            transform: scale(1.1);
        }

        .music-btn.playing {
            animation: musicPulse 0.5s ease-in-out infinite;
        }

        @keyframes musicPulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }
        }
    </style>
</head>

<body>
    <div class="floating-hearts" id="floatingHearts"></div>
    <div class="fireworks" id="fireworks"></div>

    <div class="love-counter">
        💕 点击了 <span id="loveCount">0</span> 次
    </div>

    <div class="container">
        <h1>💖 给帆帆的一封信 💖</h1>

        <div class="photo-frame">👩‍❤️‍👨</div>

        <div class="countdown">
            <div class="countdown-item">
                <span id="days">00</span>
                <label>天</label>
            </div>
            <div class="countdown-item">
                <span id="hours">00</span>
                <label>时</label>
            </div>
            <div class="countdown-item">
                <span id="minutes">00</span>
                <label>分</label>
            </div>
            <div class="countdown-item">
                <span id="seconds">00</span>
                <label>秒</label>
            </div>
        </div>

        <div class="envelope" onclick="openLetter()">
            <span class="envelope-text">点我打开信封 💌</span>
        </div>

        <div class="letter" id="letter">
            <span class="close-btn" onclick="closeLetter()">×</span>
            <h2>💕 张朦帆 💕</h2>
            <p>很开心你出现在我的生命当中。</p>
            <p>成为了我很重要的人，离不开也不想离开的人；</p>
            <p>每看你一眼心里的不开心就能被你解决。</p>
            <p>就好像你是我心中永远的阳光，</p>
            <p>照亮我生命中的每一天。</p>
            <p>愿意和你走到结婚走到白头，</p>
            <p>这辈子我会一直和你在一起，直到我老。</p>
            <p class="signature">—— 最爱你的人 💋</p>
        </div>

        <div class="say-something">
            <button onclick="showMessages()">🌸 想对你说 🌸</button>
        </div>

        <div class="messages-container" id="messagesContainer">
            <span class="close-btn" onclick="closeMessages()">×</span>
            <div id="messagesArea"></div>
        </div>

        <div class="pet-pet" onclick="petCat()"></div>
        <p class="pet-text">👆 点我摸摸Ta (≧◡≦)</p>
    </div>

    <button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵</button>

    <script>
        let loveCount = 0;
        let messageIndex = 0;
        let isPlaying = false;

        const sweetMessages = [
            "遇见你，是我最美丽的意外 🌟",
            "你的笑容是我每天醒来的动力 😊",
            "想牵着你的手，走完余生的路 👫",
            "你是我的天空，让我自由飞翔 🦅",
            "有你在身边，每一天都是情人节 💝",
            "我愿意用一生来爱你 ❤️",
            "你的眼睛里有星辰大海 ✨",
            "和你在一起的每一秒都很珍贵 ⏰",
            "你是我心里最美的风景 🏞️",
            "愿做你的小太阳，永远温暖你 ☀️",
            "么么哒～ 😘",
            "爱你哟～ 💕",
            "想你想你想你～ 🥰",
            "今天也要加油鸭～ 🦆",
            "你是最棒哒～ 💪"
        ];

        function createFloatingHearts() {
            const hearts = ['💕', '💖', '💗', '💓', '💝', '❤️', '💘', '💞'];
            const container = document.getElementById('floatingHearts');

            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 6 + 's';
                heart.style.animationDuration = (4 + Math.random() * 4) + 's';
                container.appendChild(heart);
            }
        }

        document.addEventListener('click', function (e) {
            loveCount++;
            document.getElementById('loveCount').textContent = loveCount;

            const heart = document.createElement('div');
            heart.className = 'click-heart';
            heart.textContent = ['💕', '💖', '❤️', '💗'][Math.floor(Math.random() * 4)];
            heart.style.left = e.clientX + 'px';
            heart.style.top = e.clientY + 'px';
            document.body.appendChild(heart);

            setTimeout(() => heart.remove(), 1000);

            if (loveCount % 50 === 0) {
                createFireworks(e.clientX, e.clientY);
            }
        });

        function openLetter() {
            document.getElementById('letter').classList.add('show');
            createFireworks(window.innerWidth / 2, window.innerHeight / 2);
        }

        function closeLetter() {
            document.getElementById('letter').classList.remove('show');
        }

        function showMessages() {
            const container = document.getElementById('messagesContainer');
            const area = document.getElementById('messagesArea');
            container.classList.add('show');

            area.innerHTML = '';
            messageIndex = 0;
            showNextMessage(area);
        }

        function showNextMessage(area) {
            if (messageIndex < sweetMessages.length) {
                const msg = document.createElement('div');
                msg.className = 'message';
                msg.textContent = sweetMessages[messageIndex];
                area.appendChild(msg);
                messageIndex++;

                setTimeout(() => showNextMessage(area), 1500);
            }
        }

        function closeMessages() {
            document.getElementById('messagesContainer').classList.remove('show');
        }

        function petCat() {
            const petElement = document.querySelector('.pet-pet');
            petElement.style.transform = 'scale(1.2)';
            setTimeout(() => {
                petElement.style.transform = 'scale(1)';
            }, 200);

            createConfetti();
        }

        function createConfetti() {
            const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'];

            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 4000);
            }
        }

        function createFireworks(x, y) {
            const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#ff9f43'];
            const container = document.getElementById('fireworks');

            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'firework';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];

                const angle = (i / 20) * Math.PI * 2;
                const velocity = 50 + Math.random() * 50;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;

                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                particle.style.animation = `fireworkExplode 1s ease-out forwards`;
                particle.style.transform = `translate(${tx}px, ${ty}px)`;

                container.appendChild(particle);
                setTimeout(() => particle.remove(), 1000);
            }
        }

        function updateCountdown() {
            const now = new Date();

            // 计算从2020年9月21日到当前日期的天数
            const startDate = new Date('2020-09-21');
            const diffTime = Math.abs(now - startDate);
            const days = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            // 获取当前时间的时分秒
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            document.getElementById('days').textContent = String(days).padStart(4, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        function toggleMusic() {
            const btn = document.getElementById('musicBtn');
            isPlaying = !isPlaying;

            if (isPlaying) {
                btn.classList.add('playing');
                btn.textContent = '🎶';
            } else {
                btn.classList.remove('playing');
                btn.textContent = '🎵';
            }
        }

        setInterval(() => {
            const randomX = Math.random() * window.innerWidth;
            const randomY = Math.random() * window.innerHeight * 0.5;
            if (Math.random() > 0.7) {
                createFireworks(randomX, randomY);
            }
        }, 5000);

        createFloatingHearts();
        setInterval(updateCountdown, 1000);
        updateCountdown();

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                closeLetter();
                closeMessages();
            }
        });
    </script>
</body>

</html>
